<!DOCTYPE html>
<html>
<head>
    <title>Smart ERP Billing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { background: #f5f5f5; }
        .container { margin-top: 30px; }
        .card { padding: 20px; margin-bottom: 20px; border-radius: 10px; }
    </style>
</head>

<body>

<div class="container">
    <h2 class="text-center">Smart ERP Billing System</h2>

    <!-- Customer -->
    <div class="card">
        <h4>Add Customer</h4>
        <input id="custName" class="form-control mb-2" placeholder="Customer Name">
        <button onclick="addCustomer()" class="btn btn-primary">Add</button>
        <select id="customerList" class="form-control mt-2"></select>
    </div>

    <!-- Product -->
    <div class="card">
        <h4>Add Product</h4>
        <input id="prodName" class="form-control mb-2" placeholder="Product Name">
        <input id="prodPrice" class="form-control mb-2" placeholder="Price">
        <button onclick="addProduct()" class="btn btn-success">Add</button>
        <select id="productList" class="form-control mt-2"></select>
    </div>

    <!-- Invoice -->
    <div class="card">
        <h4>Create Invoice</h4>

        <input id="qty" class="form-control mb-2" placeholder="Quantity">

        <button onclick="addItem()" class="btn btn-warning">Add Item</button>
        <button onclick="createInvoice()" class="btn btn-info">Save Invoice</button>
        <button onclick="downloadPDF()" class="btn btn-danger">Download PDF</button>

        <ul id="items" class="mt-3"></ul>
    </div>
</div>

<script>
let customers = [];
let products = [];
let cart = [];
let lastInvoice = null;

// Company Details
const company = {
    name: "ABC Pvt Ltd",
    address: "Delhi, India",
    gst: "GSTIN: 22AAAAA0000A1Z5"
};

// Add Customer
function addCustomer() {
    let name = document.getElementById("custName").value;
    if (!name) return alert("Enter name");

    customers.push(name);
    document.getElementById("customerList").add(new Option(name, name));
    document.getElementById("custName").value = "";
}

// Add Product
function addProduct() {
    let name = document.getElementById("prodName").value;
    let price = document.getElementById("prodPrice").value;

    if (!name || !price) return alert("Enter details");

    products.push({ name, price: Number(price) });
    document.getElementById("productList").add(new Option(name, name));

    document.getElementById("prodName").value = "";
    document.getElementById("prodPrice").value = "";
}

// Add Item
function addItem() {
    let productName = document.getElementById("productList").value;
    let qty = Number(document.getElementById("qty").value);

    if (!productName || !qty) return alert("Select product & qty");

    let product = products.find(p => p.name === productName);

    let item = {
        product: productName,
        qty: qty,
        price: product.price,
        total: product.price * qty
    };

    cart.push(item);

    let li = document.createElement("li");
    li.innerText = productName + " - " + qty + " x Rs " + product.price;
    document.getElementById("items").appendChild(li);

    document.getElementById("qty").value = "";
}

// Create Invoice
function createInvoice() {
    let customer = document.getElementById("customerList").value;
    if (!customer) return alert("Select customer");

    let total = cart.reduce((sum, item) => sum + item.total, 0);

    let invoiceNo = "INV-" + Math.floor(Math.random() * 10000);

    lastInvoice = { customer, items: cart, total, invoiceNo };

    alert("Invoice Saved ✅");
}

// PDF
function downloadPDF() {
    if (!lastInvoice) return alert("Create invoice first!");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // Company Header
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text(company.name, 10, 10);

    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text(company.address, 10, 15);
    doc.text(company.gst, 10, 20);

    // Title
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("INVOICE", 150, 15);

    // Invoice Info
    doc.setFontSize(11);
    doc.setFont("helvetica", "normal");
    doc.text("Invoice No: " + lastInvoice.invoiceNo, 10, 30);
    doc.text("Customer: " + lastInvoice.customer, 10, 36);
    doc.text("Date: " + new Date().toLocaleDateString("en-IN"), 140, 30);

    // Table
    let tableData = lastInvoice.items.map((item, i) => [
        i + 1,
        item.product,
        item.qty,
        "Rs " + item.price,
        "Rs " + item.total
    ]);

    doc.autoTable({
        startY: 45,
        head: [["#", "Product", "Qty", "Price", "Total"]],
        body: tableData,
        theme: "grid",
        headStyles: { fillColor: [0, 102, 204] }
    });

    let y = doc.lastAutoTable.finalY + 10;

    // GST
    let subtotal = lastInvoice.total;
    let cgst = subtotal * 0.09;
    let sgst = subtotal * 0.09;
    let grand = subtotal + cgst + sgst;

    doc.text("Subtotal: Rs " + subtotal.toFixed(2), 10, y);
    doc.text("CGST (9%): Rs " + cgst.toFixed(2), 10, y + 8);
    doc.text("SGST (9%): Rs " + sgst.toFixed(2), 10, y + 16);

    doc.setFont("helvetica", "bold");
    doc.text("Grand Total: Rs " + grand.toFixed(2), 10, y + 28);

    // Signature
    doc.setFont("helvetica", "normal");
    doc.text("Authorized Signature", 140, y + 40);

    // Footer
    doc.text("Thank you for your business!", 60, y + 55);

    doc.save("Invoice.pdf");
}
</script>

</body>
</html>
